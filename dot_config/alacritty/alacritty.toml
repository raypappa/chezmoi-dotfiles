[scrolling]
history = 100000

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t/"

[window]
dynamic_title = true
opacity = 0.8
startup_mode = "Maximized"

[font]
size = 15

[font.normal]
family = "OpenDyslexicM Nerd Font Mono"
[font.bold]
family = "OpenDyslexicM Nerd Font Mono"
style = "Bold"

[general]
live_config_reload = true
import = ["key-bindings.toml", "scheme.toml", "windows.toml"]
